{% extends "base.html" %}

{% block content %}
<h2>Admin Stats</h2>

<h3>Top Commenter</h3>
{% if top_commenter %}
    <p>
        <strong>User:</strong> {{ top_commenter.user }}<br>
        <strong>Comments Posted:</strong> {{ top_commenter.comment_count }}
    </p>
{% else %}
    <p>No comments have been posted yet.</p>
{% endif %}
{% endblock %}
